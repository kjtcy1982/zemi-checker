// ── 開講時期のソート順 ──
const QUARTER_ORDER = {
  "Q1": 1, "Q2": 2, "Q2集中": 2.5, "Q2（隔週）": 2.1,
  "Q3": 3, "Q3（隔週）": 3.1,
  "Q4": 4, "Q4（隔週）": 4.1,
  "夏期集中": 5, "2026年度不開講": 90,
  "時間割に記載なし": 91, "—": 99
};
function quarterSort(q) {
  return QUARTER_ORDER[q] ?? 50;
}

// ── UI構築 ──
const grid = document.getElementById("zemi-grid");
ZEMIS.forEach(z => {
  const label = document.createElement("label");
  label.className = "zemi-item";
  label.innerHTML = `<input type="checkbox" value="${z.id}"><span class="zemi-name">${z.name}</span><span class="zemi-teacher">${z.teacher}</span>`;
  label.addEventListener("change", () => {
    label.classList.toggle("checked", label.querySelector("input").checked);
    render();
  });
  grid.appendChild(label);
});

function getChecked() {
  return [...document.querySelectorAll('.zemi-grid input:checked')].map(cb => cb.value);
}

function render() {
  const checked = getChecked();
  const noSel = document.getElementById("no-selection");
  const content = document.getElementById("result-content");

  if (checked.length === 0) {
    noSel.style.display = "block";
    content.style.display = "none";
    return;
  }
  noSel.style.display = "none";
  content.style.display = "block";

  // フィルタ＆マージ
  const relevant = COURSES.filter(c =>
    checked.some(z => c.reqs[z])
  );

  // ◎がある科目を先に、その中で開講時期順
  relevant.sort((a, b) => {
    const aHasBefore = checked.some(z => a.reqs[z] && a.reqs[z].level === "◎");
    const bHasBefore = checked.some(z => b.reqs[z] && b.reqs[z].level === "◎");
    if (aHasBefore !== bHasBefore) return aHasBefore ? -1 : 1;
    return quarterSort(a.quarter) - quarterSort(b.quarter);
  });

  const tbody = document.getElementById("result-tbody");
  tbody.innerHTML = "";

  const usedNotes = new Set();

  relevant.forEach(c => {
    const tr = document.createElement("tr");

    // 科目名（シラバスリンク付き）
    const tdName = document.createElement("td");
    const isNotOffered = c.quarter === "2026年度不開講" || c.quarter === "時間割に記載なし";
    if (c.url) {
      const a = document.createElement("a");
      a.href = c.url;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "course-link";
      if (isNotOffered) a.classList.add("not-offered");
      a.textContent = c.name;
      tdName.appendChild(a);
    } else {
      tdName.innerHTML = isNotOffered
        ? `<span class="not-offered">${esc(c.name)}</span>`
        : esc(c.name);
    }
    tr.appendChild(tdName);

    // 開講時期
    const tdQ = document.createElement("td");
    tdQ.textContent = c.quarter;
    if (isNotOffered) tdQ.classList.add("not-offered");
    tr.appendChild(tdQ);

    // 曜日・時限
    const tdDay = document.createElement("td");
    tdDay.textContent = c.dayPeriod;
    if (isNotOffered) tdDay.classList.add("not-offered");
    tr.appendChild(tdDay);

    // 担当教員
    const tdInst = document.createElement("td");
    tdInst.textContent = c.instructor;
    if (isNotOffered) tdInst.classList.add("not-offered");
    tr.appendChild(tdInst);

    // 要望レベル・ゼミ
    const tdReqs = document.createElement("td");
    const tags = document.createElement("div");
    tags.className = "zemi-tags";

    checked.forEach(z => {
      const r = c.reqs[z];
      if (!r) return;
      const span = document.createElement("span");
      const isBefore = r.level === "◎";
      span.className = "zemi-tag " + (isBefore ? "zemi-tag-before" : "zemi-tag-grad");
      let label = r.level + " " + ZEMI_SHORT[z];
      if (r.note) {
        label += r.note;
        usedNotes.add(r.note);
      }
      span.textContent = label;
      tags.appendChild(span);
    });
    tdReqs.appendChild(tags);
    tr.appendChild(tdReqs);

    tbody.appendChild(tr);
  });

  // 注釈表示
  const fn = document.getElementById("footnotes");
  if (usedNotes.size === 0) {
    fn.style.display = "none";
  } else {
    fn.style.display = "block";
    const sortedNotes = [...usedNotes].sort((a, b) => {
      const na = parseInt(a.replace("*", ""));
      const nb = parseInt(b.replace("*", ""));
      return na - nb;
    });
    fn.innerHTML = "<dl>" + sortedNotes.map(k =>
      `<dt>${esc(k)}</dt><dd>${esc(ANNOTATIONS[k] || "")}</dd>`
    ).join("") + "</dl>";
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
